name: ProofCapture
options:
  bundleIdPrefix: com.proof
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  developmentLanguage: en
  createIntermediateGroups: true
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  ProofCapture:
    type: application
    platform: iOS
    sources:
      - path: ProofCapture
    dependencies:
      - package: Supabase
    settings:
      base:
        INFOPLIST_FILE: ProofCapture/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.proof.capture
    entitlements:
      path: ProofCapture/ProofCapture.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    info:
      path: ProofCapture/Info.plist
      properties:
        CFBundleDisplayName: Proof
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Proof needs camera access to capture your progress photos."
        NSPhotoLibraryAddUsageDescription: "Proof saves your progress photos to your camera roll."
        NSSpeechRecognitionUsageDescription: "Proof uses audio to guide you through photo capture."
