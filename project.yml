name: ProofCapture
options:
  bundleIdPrefix: com.proof
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  developmentLanguage: en
  createIntermediateGroups: true
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  ProofCapture:
    type: application
    platform: iOS
    configFiles:
      Debug: BuildConfig.xcconfig
      Release: BuildConfig.xcconfig
    sources:
      - path: ProofCapture
    dependencies:
      - package: Supabase
    settings:
      base:
        INFOPLIST_FILE: ProofCapture/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.proof.capture
    entitlements:
      path: ProofCapture/ProofCapture.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    info:
      path: ProofCapture/Info.plist
      properties:
        CFBundleDisplayName: Proof
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Proof needs camera access to capture your progress photos."
        NSPhotoLibraryAddUsageDescription: "Proof saves your progress photos to your camera roll."
        CFBundleURLTypes:
          - CFBundleURLName: $(PRODUCT_BUNDLE_IDENTIFIER)
            CFBundleURLSchemes:
              - $(PRODUCT_BUNDLE_IDENTIFIER)
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        SUPABASE_REDIRECT_URL: $(PRODUCT_BUNDLE_IDENTIFIER)://auth-callback
